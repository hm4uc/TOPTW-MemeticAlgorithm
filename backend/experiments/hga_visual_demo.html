//  RENDERING

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let currentStep = 0;
let autoInterval = null;
let animPhase = 0;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

function poiScreenPos(poi) {
  const rect = canvas.getBoundingClientRect();
  const padX = 60, padY = 40;
  const scaleX = (rect.width - padX * 2) / 800;
  const scaleY = (rect.height - padY * 2) / 600;
  return {
    x: padX + poi.x * scaleX,
    y: padY + poi.y * scaleY,
  };
}

function drawArrow(fromX, fromY, toX, toY, color, lineWidth, dashed) {
  const dx = toX - fromX, dy = toY - fromY;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len < 1) return;

  const headLen = 10;
  const angle = Math.atan2(dy, dx);

  // Shorten line to not overlap POI circles
  const shortenStart = 16, shortenEnd = 16;
  const sx = fromX + (dx/len) * shortenStart;
  const sy = fromY + (dy/len) * shortenStart;
  const ex = toX - (dx/len) * shortenEnd;
  const ey = toY - (dy/len) * shortenEnd;

  ctx.beginPath();
  if (dashed) ctx.setLineDash([6, 4]);
  else ctx.setLineDash([]);
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.moveTo(sx, sy);
  ctx.lineTo(ex, ey);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead
  ctx.beginPath();
  ctx.fillStyle = color;
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - headLen * Math.cos(angle - 0.35), ey - headLen * Math.sin(angle - 0.35));
  ctx.lineTo(ex - headLen * Math.cos(angle + 0.35), ey - headLen * Math.sin(angle + 0.35));
  ctx.closePath();
  ctx.fill();
}

function drawPOI(poi, alpha, ring, ringColor, pulse) {
  const pos = poiScreenPos(poi);
  const r = poi.cat === 'depot' ? 18 : 14;
  const catInfo = CATEGORIES[poi.cat] || CATEGORIES.history;

  // Pulse animation
  if (pulse) {
    const pulseR = r + 8 + Math.sin(animPhase * 0.1) * 4;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, pulseR, 0, Math.PI * 2);
    ctx.fillStyle = catInfo.color + '33';
    ctx.fill();
  }

  // Ring
  if (ring) {
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r + 5, 0, Math.PI * 2);
    ctx.strokeStyle = ringColor || '#fbbf24';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // Circle
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
  ctx.fillStyle = catInfo.color;
  ctx.globalAlpha = alpha;
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#0f172a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // ID
  ctx.fillStyle = 'white';
  ctx.font = 'bold 11px Inter';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(poi.id === 0 ? 'D' : poi.id, pos.x, pos.y);

  // Name label
  ctx.fillStyle = '#94a3b8';
  ctx.font = '10px Inter';
  ctx.fillText(poi.name, pos.x, pos.y + r + 14);
}

function render() {
  const rect = canvas.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);

  const step = STEPS[currentStep];

  // Draw all POIs (dimmed)
  if (step.showAllPOIs) {
    POIs.forEach(poi => {
      const inRoute = step.route && step.route.includes(poi.id);
      const inRoute2 = step.route2 && step.route2.includes(poi.id);
      const isViolation = step.violations && step.violations.includes(poi.id);
      const isRemoved = step.removed && step.removed.includes(poi.id);
      const isAdded = step.added && step.added.includes(poi.id);

      if (isRemoved) {
        drawPOI(poi, 0.3, true, '#f87171', false);
        // Draw X
        const pos = poiScreenPos(poi);
        ctx.strokeStyle = '#f87171';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(pos.x-8, pos.y-8); ctx.lineTo(pos.x+8, pos.y+8); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pos.x+8, pos.y-8); ctx.lineTo(pos.x-8, pos.y+8); ctx.stroke();
      } else if (isAdded) {
        drawPOI(poi, 1.0, true, '#4ade80', true);
      } else if (isViolation) {
        drawPOI(poi, 1.0, true, '#f87171', true);
      } else if (inRoute || inRoute2) {
        drawPOI(poi, 1.0, false, null, false);
      } else {
        drawPOI(poi, 0.25, false, null, false);
      }
    });
  }

  // Draw route 2 (parent 2) if exists — dashed gray
  if (step.route2) {
    for (let i = 0; i < step.route2.length - 1; i++) {
      const from = POIs.find(p => p.id === step.route2[i]);
      const to = POIs.find(p => p.id === step.route2[i+1]);
      const fp = poiScreenPos(from), tp = poiScreenPos(to);
      drawArrow(fp.x, fp.y, tp.x, tp.y, '#94a3b8', 1.5, true);
    }
  }

  // Draw main route
  if (step.route && step.route.length > 1) {
    for (let i = 0; i < step.route.length - 1; i++) {
      const from = POIs.find(p => p.id === step.route[i]);
      const to = POIs.find(p => p.id === step.route[i+1]);
      const fp = poiScreenPos(from), tp = poiScreenPos(to);

      let color = '#38bdf8';
      let lw = 2.5;

      // Highlight segment from crossover
      if (step.segmentRange) {
        const intIdx = i; // index in route (0-based, includes depot)
        if (intIdx >= step.segmentRange[0] && intIdx <= step.segmentRange[1]) {
          color = '#fbbf24';
          lw = 3.5;
        }
      }

      if (step.final) {
        color = '#4ade80';
        lw = 3;
      }

      drawArrow(fp.x, fp.y, tp.x, tp.y, color, lw, false);
    }
  }

  animPhase++;
}

function updateUI() {
  const step = STEPS[currentStep];

  // Badge + title + desc
  document.getElementById('step-content').innerHTML = `
    <span class="step-badge">${step.badge}</span>
    <div class="step-title">${step.title}</div>
    <div class="step-desc">${step.desc}</div>
  `;

  // Fitness display
  const fd = document.getElementById('fitness-display');
  let fitHTML = '';
  if (step.fitness !== undefined) {
    fitHTML += `<div class="fitness-card"><div class="label">Fitness</div><div class="value ${step.fitness > 180 ? 'green' : step.fitness < 0 ? '' : 'yellow'}">${step.fitness.toFixed(1)}</div></div>`;
  }
  if (step.pois_count !== undefined) {
    fitHTML += `<div class="fitness-card"><div class="label">POIs</div><div class="value">${step.pois_count}</div></div>`;
  }
  if (step.generation !== undefined) {
    fitHTML += `<div class="fitness-card"><div class="label">Generation</div><div class="value">${step.generation}</div></div>`;
  }
  if (step.fitness2 !== undefined) {
    fitHTML += `<div class="fitness-card"><div class="label">Parent 2</div><div class="value yellow">${step.fitness2.toFixed(1)}</div></div>`;
  }
  fd.innerHTML = fitHTML;

  // Route box
  const rb = document.getElementById('route-box');
  if (step.route && step.route.length > 0) {
    const routeNames = step.route.map(id => {
      const poi = POIs.find(p => p.id === id);
      const cls = id === 0 ? 'depot' :
                  (step.added && step.added.includes(id)) ? 'added' :
                  'poi-id';
      return `<span class="${cls}">${poi.name}</span>`;
    });
    rb.innerHTML = '🗺️ ' + routeNames.join(' → ');
  } else {
    rb.innerHTML = '<em>Chọn "Next Step" để bắt đầu...</em>';
  }

  // Progress
  document.getElementById('progress').style.width = `${(currentStep / (STEPS.length - 1)) * 100}%`;

  // Buttons
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep === STEPS.length - 1;

  // Legend
  const legend = document.getElementById('legend');
  legend.innerHTML = Object.entries(CATEGORIES).map(([key, val]) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${val.color}"></div>${val.label}</div>`
  ).join('');
}

function nextStep() {
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    updateUI();
    render();
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    updateUI();
    render();
  }
}

function toggleAuto() {
  const btn = document.getElementById('btn-auto');
  if (autoInterval) {
    clearInterval(autoInterval);
    autoInterval = null;
    btn.textContent = '▶ Auto';
    btn.style.background = 'linear-gradient(135deg, #059669, #10b981)';
  } else {
    btn.textContent = '⏸ Pause';
    btn.style.background = 'linear-gradient(135deg, #dc2626, #ef4444)';
    autoInterval = setInterval(() => {
      if (currentStep < STEPS.length - 1) {
        nextStep();
      } else {
        clearInterval(autoInterval);
        autoInterval = null;
        btn.textContent = '▶ Auto';
        btn.style.background = 'linear-gradient(135deg, #059669, #10b981)';
      }
    }, 3000);
  }
}

// Animation loop
function animLoop() {
  render();
  requestAnimationFrame(animLoop);
}

// Init
window.addEventListener('resize', () => { resizeCanvas(); render(); });
window.addEventListener('load', () => {
  resizeCanvas();
  updateUI();
  animLoop();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
});
</script>
</body>
